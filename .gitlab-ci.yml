stages:
  - test
  - lint
variables:
  POSTGRES_HOST: host.docker.internal
test:
  stage: test
  tags:
    - shell
  script:
    - pip install fastapi uvicorn sqlalchemy psycopg2-binary python-dotenv requests pytest
    - Copy-Item src/api/.env .env
    - Start-Process uvicorn -ArgumentList "src.api.main:app --host 0.0.0.0 --port 8000"
    - Start-Sleep -Seconds 20
    - python -m pytest -s src/api/test/test_assert.py
    - Stop-Process -Name uvicorn -Force || Write-Host "uvicorn already stopped"
lint:
  stage: lint
  allow_failure: true
  script:
    - pip install flake8
    - flake8 airflow/dags src/api/app src/api/test src/ingestion src/init src/ml src/recovery
