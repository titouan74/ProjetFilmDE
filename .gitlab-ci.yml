image: python:3.11
stages:
  - test
  - lint
test:
  stage: test
  script:
    - pip install fastapi uvicorn sqlalchemy psycopg2-binary python-dotenv requests pytest
    - uvicorn src.api.main:app --host 0.0.0.0 --port 8000 &
    - sleep 20
    - pytest -s src/api/test/test_assert.py
lint:
  stage: lint
  allow_failure: true
  script:
    - pip install flake8
    - flake8 airflow/dags src/api/app src/api/test src/ingestion src/init src/ml src/recovery
